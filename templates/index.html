<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detector Inteligente de Fatiga</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:#00ff99;
}

.contenedor-video{
    position:relative;
    display:inline-block;
    width:95%;
    max-width:500px;
    margin-top:20px;
}

#video{
    width:100%;
    border-radius:20px;
    border:4px solid #00ff99;
    display:block;
}

#tracking{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

button{
    background:#00aa66;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:15px;
    font-size:20px;
    margin-top:20px;
}

.card{
    background:#222;
    margin:15px auto;
    padding:15px;
    border-radius:15px;
    width:250px;
    font-size:22px;
}

.alerta{
    color:red;
    font-size:32px;
    font-weight:bold;
    margin-top:20px;
}

.estado{
    color:#00ff99;
    margin-top:10px;
}

</style>

</head>

<body>

<h1>Detector Inteligente de Fatiga</h1>

<button onclick="iniciarCamara()">
INICIAR CAMARA
</button>

<div class="estado" id="estado">
Esperando cámara...
</div>

<br>

<div class="contenedor-video">

    <video
        id="video"
        autoplay
        playsinline
        muted
    ></video>

    <canvas id="tracking"></canvas>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<div id="alerta" class="alerta"></div>

<div class="card">
Fatiga: <span id="fatiga">0</span>%
</div>

<div class="card">
Parpadeos: <span id="parpadeos">0</span>
</div>

<div class="card">
Bostezos: <span id="bostezos">0</span>
</div>

<div class="card">
Microsueños: <span id="microsonos">0</span>
</div>

<audio id="alarma" preload="auto">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const tracking = document.getElementById('tracking');
const alerta = document.getElementById('alerta');
const estado = document.getElementById('estado');
const audio = document.getElementById('alarma');

let alarmaActiva = false;

// --------------------------------------------------------

async function iniciarCamara(){

    try{

        estado.innerHTML = "Solicitando permisos...";

        const stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"user",
                width:{ideal:640},
                height:{ideal:480}
            },
            audio:false
        });

        video.srcObject = stream;

        estado.innerHTML = "Camara conectada";

    }catch(error){

        console.log(error);
        estado.innerHTML = "No se pudo abrir la camara";

    }

}

// --------------------------------------------------------

async function enviarFrame(){

    if(video.videoWidth === 0){
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    tracking.width = video.videoWidth;
    tracking.height = video.videoHeight;
    tracking.style.width = video.offsetWidth + "px";
    tracking.style.height = video.offsetHeight + "px";

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(async(blob)=>{

        try{

            const formData = new FormData();
            formData.append("frame", blob, "frame.jpg");

            const response = await fetch('/procesar',{
                method:'POST',
                body:formData
            });

            const data = await response.json();

            // --------------------------------

            document.getElementById('fatiga').innerText =
                data.fatiga || 0;

            document.getElementById('parpadeos').innerText =
                data.parpadeos || 0;

            document.getElementById('bostezos').innerText =
                data.bostezos || 0;

            document.getElementById('microsonos').innerText =
                data.microsonos || 0;

            estado.innerHTML = data.estado || "NORMAL";

            // --------------------------------
            // ALERTA

            if(data.alerta){

                alerta.innerHTML = "PELIGRO DE FATIGA";

                if(!alarmaActiva){
                    audio.play();
                    alarmaActiva = true;
                }

            }else{

                alerta.innerHTML = "";
                alarmaActiva = false;
                audio.pause();
                audio.currentTime = 0;

            }

            // --------------------------------
            // DIBUJAR LANDMARKS

            const tctx = tracking.getContext('2d');

            tctx.clearRect(0, 0, tracking.width, tracking.height);

            if(data.landmarks && data.landmarks.length > 0){

                tctx.strokeStyle = "#00ff00";
                tctx.lineWidth = 1;

                data.landmarks.forEach(point => {

                    tctx.beginPath();
                    tctx.arc(point.x, point.y, 1, 0, Math.PI * 2);
                    tctx.stroke();

                });

            }

        }catch(error){

            console.log(error);

        }

    },'image/jpeg', 0.8);

}

// --------------------------------------------------------

setInterval(()=>{
    enviarFrame();
}, 500);

</script>

</body>

</html>
